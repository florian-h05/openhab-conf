timestamp: Sep 21, 2025, 2:41:12 PM
component: oh-context
config:
  constants: {}
  functions:
    formatCurrency: "=(label, item1, item2) => label + ': ' + (item2 ?
      (@item1).split(' ')[0] + ' | ' + (@item2).replace('EUR', '€') :
      (@item1).replace('EUR', '€'))"
    formatEnergy: "=(label, item1, item2) => label + ': ' + (@item1).split(' ')[0] +
      ' | ' + @item2"
  variable: {}
slots:
  default:
    - component: f7-card
      config:
        style:
          --f7-chip-bg-color: rgba(255, 255, 255, 0)
          --f7-chip-height: 28px
          border-radius: var(--f7-card-expandable-border-radius)
          box-shadow: 5px 5px 10px 1px rgba(0,0,0,0.1)
          margin-left: 5px
          margin-right: 5px
          container-type: inline-size
          position: relative
      slots:
        content:
          - component: f7-block
            config:
              style:
                width: 100%
                display: flex
                flex-direction: row
                margin: -5px 0 10px 0
                padding: 0
            slots:
              default:
                - component: f7-icon
                  config:
                    f7: bolt
                    size: 18
                    style:
                      margin-right: 10px
                - component: Label
                  config:
                    style:
                      font-size: 12px
                      margin-top: 0
                    text: "=props.title ? props.title : 'EMS'"
          - component: f7-block
            config:
              style:
                margin: 0 0 0 -4px
                padding: 0
                '--scale-factor': min(1, calc(100cqw / 360px)
                zoom: var(--scale-factor)
            slots:
              default:
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: gauge
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 0
                    text: =fn.formatEnergy(props.supplyLabel,
                      props.supplyItemDay,
                      props.supplyItemMonth)
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: gauge
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 10px
                    text: =fn.formatEnergy(props.selfConsumptionLabel,
                      props.selfConsumptionItemDay,
                      props.selfConsumptionItemMonth)
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: gauge
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 10px
                    text: =fn.formatEnergy(props.feedInLabel,
                      props.feedInItemDay,
                      props.feedInItemMonth)
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: money_euro_circle
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 10px
                    text: =fn.formatCurrency(props.costLabel,
                      props.costItemMonth,
                      props.costItemTotal)
                    visible: "=props.costItemMonth ? true : false"
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: money_euro_circle
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 10px
                    text: =fn.formatCurrency(props.savingLabel,
                      props.savingsItemMonth,
                      props.savingsItemTotal)
                    visible: "=props.savingsItemMonth ? true : false"
                - component: f7-chip
                  config:
                    iconColor: "=themeOptions.dark === 'dark' ? 'white' : 'black'"
                    iconF7: money_euro_circle
                    iconSize: 20
                    style:
                      font-size: 16px
                      margin-bottom: 0
                      margin-top: 10px
                    text: =fn.formatCurrency(props.earningsLabel,
                      props.earningsItemMonth,
                      props.earningsItemTotal)
                    visible: "=props.earningsItemMonth ? true : false"
          - component: oh-link
            config:
              actionFeedback: Erledigt!
              actionPropsParameterGroup: widgetAction
              style:
                position: absolute
                top: 0
                bottom: 0
                left: 0
                right: 0
              visible: "=props.widget_action ? true : false"
